[Game]
; 必填，指定RGSS样式脚本压缩文件的执行路径
Scripts=Data/Scripts.rvdata2
; 窗口标题，Windows平台需要输入ASCII编码的文本，其他平台为UTF-8
Title=Untitled

[Engine]
; RGSS版本指定 (0-3)，为0自动根据脚本路径适配对应版本
APIVersion=0
; 指定默认字体及其他字体的加载目录
DefaultFontPath=Fonts/Default.ttf
; 指定GUI汉化文件路径
I18nXMLPath=Game.xml
; 指定启动时窗口的大小（非游戏内分辨率），不填则设置为游戏分辨率大小
WindowSize=544|416
; 指定启动时游戏内分辨率大小，不填则按照对应RGSS版本设置
Resolution=544|416

[GUI]
; 禁用默认F1菜单
DisableSettings=false
; 禁用F2帧数监控
DisableFPSMonitor=false
; 是否禁用F12重置游戏功能
DisableReset=false

[Renderer]
; 渲染器后端指定（D3D11 D3D12 VULKAN OPENGL）
Backend=UNDEFINED
; 内置渲染管线的默认纹理采样方式（0 - 线性采样, 1 - 临近采样, ...）
PipelineDefaultSampler=0
; 启用渲染器验证层（会降低渲染性能）
RenderValidation=false
; 启用更大的顶点数据范围，如果显卡不支持请关闭
LargeDrawIndex=true
; 是否允许跳帧（不允许跳帧则会出现画面加速现象）
AllowSkipFrame=true
; 是否全屏启动游戏
Fullscreen=false
; 启动游戏时的默认帧率 (0=不限帧, RGSS1默认40, RGSS2/3默认60)
FrameRate=60
; 是否启用垂直同步 (0=关闭, 1=开启)
VSync=1
; 是否保持原始画面比例
KeepRatio=true
; 是否启用窗口大小调整
WinResizable=true
; 窗口调整大小时是否保持宽高比
FixedAspectRatio=true
; 是否同步到显示器刷新率 (启用时自动覆盖FrameRate和VSync设置)
SyncToRefreshRate=false

; Font rendering options (defaults match RGSS Enterbrain behavior)
; 字体缩放系数 (0.9 = RGSS 原始行为)
FontScale=0.9
; 字体字距调整 (RGSS 默认开启)
FontKerning=true
; 字体提示模式: 0=Normal 1=Light 2=Mono 3=None (RGSS 默认 None, 3)
FontHinting=3
; 字体轮廓裁切: 裁掉描边与正文交接处的透明缝 (RGSS 原始行为)
FontOutlineCrop=true
; 是否允许游戏后台运行
BackgroundRunning=true
; 是否采用平滑采样进行画面呈现
SmoothScalePresent=true
; 是否保存 Engine.log 日志文件
SaveLog=true

[Platform]
; [Windows] 启用调试控制台窗口（AllocConsole）
DebuggingConsole=true
; [Windows] 是否禁用输入法
DisableIME=false
; [移动端] 设置屏幕旋转方向：
; 可填：LandscapeLeft LandscapeRight Portrait PortraitUpsideDown
Orientations=LandscapeLeft LandscapeRight
